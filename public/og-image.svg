<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Pattern dots -->
  <g fill="white" fill-opacity="0.06">
    <circle cx="100" cy="100" r="3"/>
    <circle cx="160" cy="100" r="3"/>
    <circle cx="220" cy="100" r="3"/>
    <circle cx="100" cy="160" r="3"/>
    <circle cx="160" cy="160" r="3"/>
    <circle cx="220" cy="160" r="3"/>
    <circle cx="980" cy="470" r="3"/>
    <circle cx="1040" cy="470" r="3"/>
    <circle cx="1100" cy="470" r="3"/>
    <circle cx="980" cy="530" r="3"/>
    <circle cx="1040" cy="530" r="3"/>
    <circle cx="1100" cy="530" r="3"/>
  </g>
  <!-- Icon -->
  <rect x="100" y="200" width="56" height="56" rx="14" fill="white" fill-opacity="0.2"/>
  <text x="128" y="238" font-family="sans-serif" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">&#9733;</text>
  <!-- Title -->
  <text x="100" y="320" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-1">繰上返済</text>
  <text x="100" y="400" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-1">シミュレーター</text>
  <!-- Subtitle -->
  <text x="100" y="460" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24" fill="white" fill-opacity="0.75">利息削減額・期間短縮を具体的な数字で確認</text>
  <!-- Stats -->
  <g transform="translate(100, 510)">
    <rect width="160" height="60" rx="8" fill="white" fill-opacity="0.12"/>
    <text x="80" y="25" font-family="sans-serif" font-size="14" fill="white" fill-opacity="0.7" text-anchor="middle">利息削減</text>
    <text x="80" y="48" font-family="sans-serif" font-size="20" font-weight="800" fill="white" text-anchor="middle">100万円+</text>
  </g>
  <g transform="translate(280, 510)">
    <rect width="160" height="60" rx="8" fill="white" fill-opacity="0.12"/>
    <text x="80" y="25" font-family="sans-serif" font-size="14" fill="white" fill-opacity="0.7" text-anchor="middle">期間短縮</text>
    <text x="80" y="48" font-family="sans-serif" font-size="20" font-weight="800" fill="white" text-anchor="middle">数年</text>
  </g>
  <g transform="translate(460, 510)">
    <rect width="160" height="60" rx="8" fill="white" fill-opacity="0.12"/>
    <text x="80" y="25" font-family="sans-serif" font-size="14" fill="white" fill-opacity="0.7" text-anchor="middle">ツール</text>
    <text x="80" y="48" font-family="sans-serif" font-size="20" font-weight="800" fill="white" text-anchor="middle">4種類</text>
  </g>
  <!-- Badge -->
  <rect x="900" y="200" width="200" height="40" rx="20" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1000" y="225" font-family="sans-serif" font-size="14" font-weight="600" fill="white" fill-opacity="0.9" text-anchor="middle">無料・登録不要</text>
</svg>
